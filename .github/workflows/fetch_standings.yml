name: Fetch Brasileirão Standings

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check if within Brasileirão match window (Brazil time UTC-3)
        id: time_check
        run: |
          python3 - <<'EOF'
          from datetime import datetime, timezone, timedelta
          import os

          brazil_tz = timezone(timedelta(hours=-3))
          now = datetime.now(brazil_tz)
          hour = now.hour
          weekday = now.weekday()  # 0=Mon … 6=Sun

          # Games can happen any day but window is 11:00–23:30 Brazil time
          in_window = 11 <= hour <= 23

          print(f"Brazil time: {now.strftime('%A %H:%M')} | In window: {in_window}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"in_window={'true' if in_window else 'false'}\n")
          EOF

      - name: Skip — outside match window
        if: steps.time_check.outputs.in_window == 'false'
        run: echo "Outside 11:00–23:30 Brazil time — skipping API call."

      - name: Fetch standings from free-api-live-football-data
        if: steps.time_check.outputs.in_window == 'true'
        env:
          API_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          HTTP_STATUS=$(curl -s -o data.json -w "%{http_code}" \
            "https://free-api-live-football-data.p.rapidapi.com/football-get-standing-all?leagueid=268" \
            -H "x-rapidapi-key: $API_KEY" \
            -H "x-rapidapi-host: free-api-live-football-data.p.rapidapi.com")

          echo "HTTP status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "API request failed with status $HTTP_STATUS — keeping existing data.json"
            git checkout -- data.json 2>/dev/null || true
            exit 0
          fi

          # Validate response has expected structure
          if ! python3 -c "
          import json
          data = json.load(open('data.json'))
          standing = data['response']['standing']
          print(f'Standings fetched: {len(standing)} teams')
          " 2>/dev/null; then
            echo "Unexpected API response shape — keeping existing data.json"
            git checkout -- data.json 2>/dev/null || true
            exit 0
          fi

      - name: Inject fetch timestamp
        if: steps.time_check.outputs.in_window == 'true'
        run: |
          python3 - <<'EOF'
          import json
          from datetime import datetime, timezone

          with open('data.json', 'r') as f:
              data = json.load(f)

          data['fetched_at'] = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')

          with open('data.json', 'w') as f:
              json.dump(data, f, ensure_ascii=False)

          print(f"Timestamp injected: {data['fetched_at']}")
          EOF

      - name: Commit updated standings
        if: steps.time_check.outputs.in_window == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet \
            && echo "No changes to commit" \
            || git commit -m "chore: update standings $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
